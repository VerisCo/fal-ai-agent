version: '3.8'

services:
  fal-image-agent:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AGENT_ID=alphapoint.fal-image-agent
      - AGENT_NAME=fal-image-agent
      - FAL_KEY=${FAL_KEY}
      - FAL_MODEL=${FAL_MODEL:-fal-ai/flux/schnell}
      - AGENT_API_KEY=${AGENT_API_KEY}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: fal-image-agent-network
